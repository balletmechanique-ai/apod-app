<!DOCTYPE html>

<html lang="ja">



<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>APOD Wall-Supporter</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="manifest"
        href="data:application/json;base64,ewogICJuYW1lIjogIkFQT0QgV2FsbC1TdXBwb3J0ZXIiLAogICJzaG9ydF9uYW1lIjogIkFQT0QiLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzA1MDUwNSIsCiAgInRoZW1lX2NvbG9yIjogIiMwNTA1MDUiLAogICJpY29ucyI6IFsKICAgIHsKICAgICAgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8yNjI2LzI2MjYyOTMucG5nIiwKICAgICAgInR5cGUiOiAiaW1hZ2UvcG5nIiwKICAgICAgInNpemVzIjogIjUxMng1MTIiCiAgICB9CiAgXQp9">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');



        body {

            font-family: 'Inter', sans-serif;

            background-color: #050505;

            color: #e0e0e0;

            -webkit-tap-highlight-color: transparent;

        }



        .glass {

            background: rgba(255, 255, 255, 0.03);

            backdrop-filter: blur(15px);

            border: 1px solid rgba(255, 255, 255, 0.08);

        }



        .loading-shimmer {

            background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%);

            background-size: 200% 100%;

            animation: shimmer 1.5s infinite;

        }



        @keyframes shimmer {

            0% {

                background-position: 200% 0;

            }



            100% {

                background-position: -200% 0;

            }

        }



        ::-webkit-scrollbar {

            display: none;

        }
    </style>

</head>



<body class="min-h-screen flex flex-col items-center p-4 pb-32">



    <header class="w-full max-w-md py-6 flex justify-between items-center">

        <div>

            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-400">

                APOD Wall-Supporter</h1>

            <p class="text-[10px] text-gray-600 tracking-widest uppercase font-bold">balletmechanique-ai</p>

        </div>

        <button onclick="toggleConfig()" class="p-2 glass rounded-full text-gray-400">

            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                <circle cx="12" cy="12" r="3" />

                <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />

            </svg>

        </button>

    </header>



    <main id="app" class="w-full max-w-md space-y-6">

        <div id="config-section" class="glass rounded-3xl p-6 space-y-4 hidden absolute inset-x-4 top-20 z-[60]">

            <div class="flex justify-between items-center">

                <h2 class="text-sm font-bold text-gray-300">Settings</h2><button onclick="toggleConfig()"
                    class="text-gray-500 text-2xl">&times;</button>

            </div>

            <div class="space-y-3">

                <input type="password" id="nasa-key" placeholder="NASA API Key (DEMO_KEY)"
                    class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-1 focus:ring-blue-500 outline-none">

                <input type="password" id="gemini-key" placeholder="Gemini API Key"
                    class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-1 focus:ring-blue-500 outline-none">

            </div>

            <button onclick="saveKeys()"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">設定を保存</button>

        </div>



        <div id="image-container" class="relative group">

            <div id="skeleton-img" class="w-full aspect-[9/16] rounded-[2.5rem] loading-shimmer hidden"></div>

            <img id="apod-img"
                class="w-full h-auto min-h-[300px] rounded-[2.5rem] object-cover shadow-2xl transition-opacity duration-1000 opacity-0"
                alt="APOD">

            <div id="media-error"
                class="hidden absolute inset-0 flex items-center justify-center text-center p-8 text-sm text-gray-400 glass rounded-[2.5rem]">

                本日のコンテンツは静止画ではありません</div>

        </div>



        <div class="glass rounded-[2.5rem] p-8 space-y-4">

            <div id="skeleton-text" class="space-y-4 hidden">

                <div class="h-8 w-3/4 loading-shimmer rounded-lg"></div>

                <div class="h-4 w-full loading-shimmer rounded-lg"></div>

            </div>

            <div id="info-content">

                <h2 id="apod-title" class="text-xl font-bold text-white leading-tight mb-1"></h2>

                <p id="apod-date" class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-6"></p>

                <div id="explanation-container" class="space-y-4">

                    <p id="explanation-ja" class="text-sm leading-relaxed text-gray-300 font-medium">宇宙の彼方からデータを取得中...

                    </p>

                    <div id="error-display"
                        class="hidden text-[10px] text-red-400 bg-red-950/30 p-3 rounded-lg border border-red-900/50">

                    </div>

                    <details class="text-[10px] text-gray-600 group">

                        <summary
                            class="cursor-pointer hover:text-gray-400 transition list-none flex items-center gap-1">

                            Original Description</summary>

                        <p id="explanation-en"
                            class="mt-3 leading-relaxed italic border-l border-white/5 pl-4 py-1 text-gray-500"></p>

                    </details>

                </div>

            </div>

        </div>

    </main>



    <div id="toast"
        class="fixed bottom-36 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full bg-white text-black text-xs font-black opacity-0 transition-all duration-300 pointer-events-none z-[100] shadow-2xl translate-y-4">

    </div>



    <script>

        const STORAGE = {

            NASA: 'apod_nasa_key',

            GEMINI: 'apod_gemini_key'

        };

        let currentImgUrl = '';



        window.onload = () => {

            const nKey = localStorage.getItem(STORAGE.NASA);

            const gKey = localStorage.getItem(STORAGE.GEMINI);

            const nasaInput = document.getElementById('nasa-key');
            const geminiInput = document.getElementById('gemini-key');

            if (nKey) nasaInput.value = nKey;
            if (gKey) geminiInput.value = gKey;

            nasaInput.addEventListener('input', () => persistConfigKeys());
            geminiInput.addEventListener('input', () => persistConfigKeys());
            nasaInput.addEventListener('change', () => persistConfigKeys());
            geminiInput.addEventListener('change', () => persistConfigKeys());
            nasaInput.addEventListener('keydown', handleConfigEnterKey);
            geminiInput.addEventListener('keydown', handleConfigEnterKey);
            window.addEventListener('beforeunload', persistConfigKeys);
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'hidden') persistConfigKeys();
            });

            if (!nKey || !gKey) { document.getElementById('config-section').classList.remove('hidden'); }

            else { fetchApod(nKey, gKey); }

        };



        function toggleConfig() {

            const configEl = document.getElementById('config-section');
            const isOpen = !configEl.classList.contains('hidden');

            if (isOpen) applyConfig();

            configEl.classList.toggle('hidden');
        }

        function handleConfigEnterKey(e) {

            if (e.key !== 'Enter') return;
            e.preventDefault();
            applyConfig(true);
            document.getElementById('config-section').classList.add('hidden');
        }

        function persistConfigKeys() {

            const nInput = document.getElementById('nasa-key').value.trim();
            const gInput = document.getElementById('gemini-key').value.trim();
            const n = nInput || localStorage.getItem(STORAGE.NASA) || 'DEMO_KEY';
            let g = gInput || localStorage.getItem(STORAGE.GEMINI);
            try {
                localStorage.setItem(STORAGE.NASA, n);
                if (gInput) localStorage.setItem(STORAGE.GEMINI, gInput);
                g = gInput || localStorage.getItem(STORAGE.GEMINI);
            } catch (e) {
                showToast('ブラウザ設定により保存できません');
            }
            return { n, g };
        }

        function applyConfig(showSavedToast = false) {

            const { n, g } = persistConfigKeys();
            if (!g) return;
            if (showSavedToast) showToast('APIキーを保存しました');
            fetchApod(n, g);
        }

        function saveKeys() {

            applyConfig(true);
            document.getElementById('config-section').classList.add('hidden');
        }



        async function fetchApod(nasaKey, geminiKey) {

            toggleLoading(true);

            const errEl = document.getElementById('error-display');

            errEl.classList.add('hidden');

            errEl.textContent = '';

            try {

                const res = await fetch(`https://api.nasa.gov/planetary/apod?api_key=${encodeURIComponent(nasaKey)}`);

                const data = await res.json().catch(() => ({}));

                if (!res.ok) {

                    const msg = data.error?.message || data.msg || `HTTP ${res.status}`;

                    const isDemo = String(nasaKey).toUpperCase() === 'DEMO_KEY';

                    const hint = res.status === 429 && isDemo

                        ? '（DEMO_KEY は時間あたりの上限が厳しいです。本番用の NASA API キーへの切り替えを検討してください）'

                        : '';

                    errEl.textContent = `NASA API: ${msg}${hint}`;

                    errEl.classList.remove('hidden');

                    document.getElementById('explanation-ja').textContent = '上記のとおり取得できませんでした。';

                    showToast('NASA API エラー');

                    return;

                }

                if (data.code || data.error) {

                    errEl.textContent = `NASA API: ${data.error || data.msg || data.code}`;

                    errEl.classList.remove('hidden');

                    document.getElementById('explanation-ja').textContent = '上記のとおり取得できませんでした。';

                    showToast('NASA API エラー');

                    return;

                }

                if (data.media_type !== 'image') {

                    document.getElementById('media-error').classList.remove('hidden');

                    return;

                }

                currentImgUrl = data.hdurl || data.url;

                const img = document.getElementById('apod-img');

                img.src = currentImgUrl;

                img.onload = () => img.classList.add('opacity-100');

                document.getElementById('apod-title').textContent = data.title;

                document.getElementById('apod-date').textContent = data.date;

                document.getElementById('explanation-en').textContent = data.explanation;

                await translateText(data.explanation, geminiKey);

            } catch (err) {

                errEl.textContent = `接続エラー: ${err.message || String(err)}（file:// で開いているとブラウザが API をブロックすることがあります。ローカルサーバー経由で開いてください）`;

                errEl.classList.remove('hidden');

                document.getElementById('explanation-ja').textContent = '上記のとおり取得できませんでした。';

                showToast('NASA通信エラー');

            } finally { toggleLoading(false); }

        }



        /**

         * REST では models/{model} のモデルコードが必須（「Gemini 3.1 Flash-Lite」などの表示名は不可）。

         * gemini-2.0-* は非推奨。翻訳用途は 3.1 Flash-Lite プレビューが公式に推奨。

         * @see https://ai.google.dev/gemini-api/docs/models/gemini-3.1-flash-lite-preview

         */

        const GEMINI_TRANSLATE_MODEL = 'gemini-3.1-flash-lite-preview';



        async function translateText(text, apiKey) {

            const jaEl = document.getElementById('explanation-ja');

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_TRANSLATE_MODEL}:generateContent?key=${encodeURIComponent(apiKey)}`;

            const prompt = `Translate to natural Japanese.

Rules:

- Plain text only (No Markdown, No #, No *).

- Output ONLY the translation.

- No intro/outro text.



Text:

${text}`;



            try {

                const res = await fetch(url, {

                    method: 'POST',

                    headers: { 'Content-Type': 'application/json' },

                    body: JSON.stringify({

                        contents: [{ parts: [{ text: prompt }] }],

                        generationConfig: {

                            temperature: 0.2,

                            topP: 0.8

                        }

                    })

                });



                const data = await res.json();

                if (!res.ok) {

                    const detail = data.error?.message || JSON.stringify(data.error || data);

                    jaEl.textContent = fallbackJaFromEn(text, `Gemini API エラー: ${detail}`);

                    return;

                }

                const part = data.candidates?.[0]?.content?.parts?.[0]?.text;

                if (!part) {

                    const block = data.promptFeedback?.blockReason || data.candidates?.[0]?.finishReason;

                    jaEl.textContent = fallbackJaFromEn(text, block ? `応答なし（${block}）` : '応答の形式が不正です');

                    return;

                }

                jaEl.textContent = part.trim();

            } catch (e) {

                jaEl.textContent = fallbackJaFromEn(text, e.message || String(e));

            }

        }



        /** 翻訳が使えないときも本文を読めるように、英語をそのまま表示（先頭に短い注記） */

        function fallbackJaFromEn(explanationEn, reason) {

            return `【自動翻訳をスキップ: ${reason}】\n\n${explanationEn}`;

        }



        function toggleLoading(isLoading) {

            document.getElementById('skeleton-img').style.display = isLoading ? 'block' : 'none';

            document.getElementById('skeleton-text').style.display = isLoading ? 'block' : 'none';

            document.getElementById('info-content').style.display = isLoading ? 'none' : 'block';

        }

        function showToast(msg) {

            const t = document.getElementById('toast'); t.textContent = msg;

            t.classList.remove('opacity-0', 'translate-y-4');

            setTimeout(() => t.classList.add('opacity-0', 'translate-y-4'), 3000);

        }

    </script>

</body>



</html>
